<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Goal Tracker — SavahLifestyle</title>
  <link rel="stylesheet" href="css/style.css"/>
  <script src="js/app.js" defer></script>
  <script src="js/localAuth.js" defer></script>
<script src="js/nav.js" defer></script>
  
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
</head>
<body>
<nav class="nav">
  <a href="index.html" class="nav-logo"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>Savah<span>Lifestyle</span></a>
  <div class="nav-actions">
    <a href="index.html" class="nav-back"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg> <span>Dashboard</span></a>
    <button class="theme-toggle" id="theme-toggle"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/></svg></button>
  </div>
</nav>
<div class="page"><div class="container-sm">
  <div class="page-header">
    <div><h1 class="page-title">Goal <span>Tracker</span></h1><p class="page-subtitle">Set meaningful goals and track your progress</p></div>
    <button class="btn btn-primary" onclick="openModal('goal-modal')">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      New Goal
    </button>
  </div>

  <div class="tabs" style="max-width:300px">
    <button class="tab active" onclick="setType('daily', this)">Daily</button>
    <button class="tab" onclick="setType('weekly', this)">Weekly</button>
    <button class="tab" onclick="setType('monthly', this)">Monthly</button>
    <button class="tab" onclick="setType('all', this)">All</button>
  </div>

  <div id="goal-list"></div>
</div></div>

<div class="modal-overlay" id="goal-modal">
  <div class="modal">
    <div class="modal-header"><div class="modal-title">New Goal</div><button class="btn-icon btn" onclick="closeModal('goal-modal')"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>
    <div class="form-group"><label class="form-label">Goal Title</label><input type="text" id="goal-title" placeholder="What do you want to achieve?" /></div>
    <div class="form-group"><label class="form-label">Target Value</label><input type="number" id="goal-target" placeholder="e.g. 10" min="1" /></div>
    <div class="form-group"><label class="form-label">Unit</label><input type="text" id="goal-unit" placeholder="e.g. pages, km, minutes" /></div>
    <div class="form-group"><label class="form-label">Period</label><select id="goal-type"><option value="daily">Daily</option><option value="weekly">Weekly</option><option value="monthly">Monthly</option></select></div>
    <div class="form-group"><label class="form-label">Deadline (optional)</label><input type="date" id="goal-deadline" /></div>
    <div style="display:flex;gap:0.75rem;margin-top:1rem">
      <button class="btn btn-secondary" style="flex:1" onclick="closeModal('goal-modal')">Cancel</button>
      <button class="btn btn-primary" style="flex:1" onclick="addGoal()">Add Goal</button>
    </div>
  </div>
</div>

<script>
let goals = JSON.parse(localStorage.getItem('savah:goals') || '[]');
let filterType = 'daily';

function setType(t, btn) {
  filterType = t;
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function addGoal() {
  const title = document.getElementById('goal-title').value.trim();
  const target = parseFloat(document.getElementById('goal-target').value);
  if (!title || !target) { Toast.show('Fill required fields', 'warning'); return; }
  goals.push({ id: Date.now(), title, target, current: 0, unit: document.getElementById('goal-unit').value || '', type: document.getElementById('goal-type').value, deadline: document.getElementById('goal-deadline').value, created: new Date().toISOString().split('T')[0] });
  save();
  closeModal('goal-modal');
  document.getElementById('goal-title').value = '';
  document.getElementById('goal-target').value = '';
  Toast.show('Goal added!', 'success');
}

function updateProgress(id, delta) {
  const g = goals.find(g => g.id === id);
  if (!g) return;
  g.current = Math.max(0, Math.min(g.target, g.current + delta));
  if (g.current >= g.target) Toast.show('<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:inline-block;vertical-align:-2px"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg> Goal completed!', 'success', 4000);
  save();
}

function deleteGoal(id) {
  goals = goals.filter(g => g.id !== id);
  save();
}

function save() { localStorage.setItem('savah:goals', JSON.stringify(goals)); render(); }

function render() {
  const filtered = filterType === 'all' ? goals : goals.filter(g => g.type === filterType);
  if (!filtered.length) {
    document.getElementById('goal-list').innerHTML = `<div class="empty-state"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg><h3>No goals yet</h3><p>Add your first goal and start making progress!</p></div>`;
    return;
  }
  document.getElementById('goal-list').innerHTML = filtered.map(g => {
    const pct = Math.min(100, Math.round((g.current / g.target) * 100));
    const done = g.current >= g.target;
    return `
      <div class="card" style="margin-bottom:1rem;${done ? 'border-color:var(--success)' : ''}">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:0.75rem;margin-bottom:1rem">
          <div>
            <div style="font-family:var(--font-head);font-weight:700;font-size:1rem;color:var(--text)">${done ? '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="display:inline-block;vertical-align:-2px;color:var(--green)"><polyline points="20 6 9 17 4 12"/></svg> ' : ''}${g.title}</div>
            <div style="font-size:0.78rem;color:var(--text-muted);margin-top:0.2rem">
              ${g.type} goal ${g.deadline ? '· Due ' + g.deadline : ''}
            </div>
          </div>
          <div style="text-align:right;flex-shrink:0">
            <div style="font-family:var(--font-head);font-size:1.4rem;font-weight:800;color:${done ? 'var(--success)' : 'var(--blue)'}">${pct}%</div>
            <div style="font-size:0.75rem;color:var(--text-muted)">${g.current}/${g.target} ${g.unit}</div>
          </div>
        </div>
        <div class="progress" style="margin-bottom:1rem">
          <div class="progress-fill" style="width:${pct}%;${done ? 'background:var(--success)' : ''}"></div>
        </div>
        <div style="display:flex;gap:0.5rem;flex-wrap:wrap">
          <button class="btn btn-secondary" style="flex:1" onclick="updateProgress(${g.id}, -1)">− 1</button>
          <button class="btn btn-secondary" style="flex:1" onclick="updateProgress(${g.id}, 1)">+ 1</button>
          <button class="btn btn-primary" style="flex:2" onclick="updateProgress(${g.id}, g.target - g.current)">Complete</button>
          <button class="btn btn-ghost btn-icon" onclick="deleteGoal(${g.id})"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg></button>
        </div>
      </div>
    `;
  }).join('');
}
render();
</script>
</body>
</html>
