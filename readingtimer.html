<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Reading Timer — SavahLifestyle</title>
<link rel="stylesheet" href="css/style.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="js/app.js" defer></script>
<script src="js/localAuth.js" defer></script>
<script src="js/nav.js" defer></script>
</head>
<body>
<div class="page"><div class="container-sm">
  <div class="page-header"><div><h1 class="page-title">Reading <span>Timer</span></h1><p class="page-subtitle">Track your reading sessions and build a habit</p></div></div>
  <div class="grid-4" style="margin-bottom:2rem" id="read-stats"></div>
  <div class="card card-gold" style="text-align:center;max-width:400px;margin:0 auto 2rem">
    <div id="read-display" style="font-family:var(--font-head);font-size:4rem;font-weight:800;color:var(--blue);line-height:1">00:00</div>
    <div style="font-size:0.85rem;color:var(--text-muted);margin:0.5rem 0 1.5rem" id="read-label">Ready to start reading</div>
    <div class="form-group"><label class="form-label">What are you reading?</label><input type="text" id="book-title" placeholder="Book / Article title..."/></div>
    <div style="display:flex;gap:0.75rem;justify-content:center">
      <button class="btn btn-primary" id="read-toggle" onclick="toggleReading()" style="min-width:120px">Start Reading</button>
      <button class="btn btn-secondary" onclick="stopReading()">Stop & Log</button>
    </div>
  </div>
  <div class="card" style="margin-bottom:1.5rem">
    <div class="card-title" style="margin-bottom:1rem">Weekly Reading (Minutes)</div>
    <div style="height:160px"><canvas id="read-chart"></canvas></div>
  </div>
  <div class="section-title">Reading Log</div>
  <div id="read-log"></div>
</div></div>
<script>
let sessions=JSON.parse(localStorage.getItem('savah:read-sessions')||'[]');
let isReading=false, startTime=null, elapsed=0, ticker=null;
const today=new Date().toISOString().split('T')[0];

function toggleReading(){
  if(!isReading){
    isReading=true; startTime=Date.now()-elapsed*1000;
    document.getElementById('read-toggle').textContent='Pause';
    document.getElementById('read-label').textContent='Reading in progress...';
    ticker=setInterval(updateTimer,1000);
  } else {
    isReading=false; clearInterval(ticker);
    elapsed=Math.floor((Date.now()-startTime)/1000);
    document.getElementById('read-toggle').textContent='Resume';
    document.getElementById('read-label').textContent='Paused';
  }
}

function updateTimer(){
  elapsed=Math.floor((Date.now()-startTime)/1000);
  const m=String(Math.floor(elapsed/60)).padStart(2,'0');
  const s=String(elapsed%60).padStart(2,'0');
  document.getElementById('read-display').textContent=m+':'+s;
}

function stopReading(){
  if(!isReading&&elapsed===0) return;
  clearInterval(ticker); isReading=false;
  if(elapsed<30){Toast.show('Too short to log. Keep reading!','info');return;}
  const mins=Math.floor(elapsed/60);
  const title=document.getElementById('book-title').value.trim()||'Unnamed session';
  sessions.unshift({id:Date.now(),title,minutes:mins,date:today});
  localStorage.setItem('savah:read-sessions',JSON.stringify(sessions));
  elapsed=0; startTime=null;
  document.getElementById('read-display').textContent='00:00';
  document.getElementById('read-toggle').textContent='Start Reading';
  document.getElementById('read-label').textContent='Session logged!';
  document.getElementById('book-title').value='';
  render(); Toast.show(`${mins} minutes logged!`,'success');
}

function render(){
  const totalMins=sessions.reduce((s,e)=>s+e.minutes,0);
  const todayMins=sessions.filter(s=>s.date===today).reduce((s,e)=>s+e.minutes,0);
  const days7=[...new Set(sessions.map(s=>s.date))].length;
  document.getElementById('read-stats').innerHTML=[
    {label:'Total Minutes',value:totalMins,color:'var(--blue)'},
    {label:'Today',value:todayMins+'m',color:'#22c55e'},
    {label:'Sessions',value:sessions.length,color:'#3b82f6'},
    {label:'Days Read',value:days7,color:'#a855f7'},
  ].map(s=>`<div class="stat-card"><div><div class="stat-value" style="color:${s.color}">${s.value}</div><div class="stat-label">${s.label}</div></div></div>`).join('');

  const days=Array.from({length:7},(_,i)=>{const d=new Date();d.setDate(d.getDate()-(6-i));return d.toISOString().split('T')[0];});
  const byDay=days.map(d=>sessions.filter(s=>s.date===d).reduce((sum,s)=>sum+s.minutes,0));
  new Chart(document.getElementById('read-chart'),{type:'bar',data:{labels:days.map(d=>new Date(d).toLocaleDateString('en-US',{weekday:'short'})),datasets:[{data:byDay,backgroundColor:'rgba(240,180,41,0.5)',borderColor:'#f0b429',borderWidth:1,borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#64748b',font:{size:10}},grid:{display:false}},y:{ticks:{color:'#64748b',font:{size:10}},grid:{color:'rgba(255,255,255,0.04)'}}}}}); 

  if(!sessions.length){document.getElementById('read-log').innerHTML='<div class="empty-state"><h3>No sessions yet</h3><p>Start a reading session above!</p></div>';return;}
  document.getElementById('read-log').innerHTML=sessions.slice(0,20).map(s=>`
    <div style="display:flex;align-items:center;gap:0.75rem;padding:0.75rem 1rem;background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:0.4rem">
      <span style="font-size:1.2rem"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:inline-block;vertical-align:-2px"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg></span>
      <div style="flex:1"><div style="font-weight:600;font-size:0.9rem">${s.title}</div><div style="font-size:0.75rem;color:var(--text-muted)">${s.date}</div></div>
      <div style="font-family:var(--font-head);font-weight:700;color:var(--blue)">${s.minutes}m</div>
    </div>`).join('');
}
render();
</script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  buildNav('reading');
  buildFooter();
});
</script>
</body></html>
