<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Notes — SavahLifestyle</title>
  <link rel="stylesheet" href="css/style.css"/>
  <script src="js/app.js" defer></script>
  <script src="js/localAuth.js" defer></script>
<script src="js/nav.js" defer></script>
</head>
<body>
<div id="page-loader"><div class="loader-logo"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>Savah<span>Lifestyle</span></div><div class="loader-bar-wrap"><div class="loader-bar"></div></div></div>
<div class="page"><div class="container" style="padding-top:2rem;padding-bottom:3rem">
  <div class="page-header">
    <div><h1 class="page-title">Quick <span>Notes</span></h1><p class="page-subtitle">Jot down ideas, reminders and thoughts</p></div>
    <a href="index.html" class="nav-back"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>Back</a>
  </div>
  <div style="display:flex;gap:1rem;flex-wrap:wrap;margin-bottom:1.5rem;align-items:center">
    <input type="text" class="form-input" id="note-search" placeholder="Search notes…" style="max-width:260px" oninput="renderNotes()"/>
    <select class="form-input" id="note-filter" style="max-width:160px" onchange="renderNotes()">
      <option value="all">All Notes</option>
      <option value="pinned">Pinned</option>
      <option value="work">Work</option>
      <option value="personal">Personal</option>
      <option value="idea">Ideas</option>
    </select>
    <button class="btn btn-primary" onclick="openNewNote()">+ New Note</button>
    <a href="stickynotes.html" class="btn btn-secondary"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:inline-block;vertical-align:-2px"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>️ Sticky Notes Board</a>
    <a href="journal.html" class="btn btn-secondary"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:inline-block;vertical-align:-2px"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg> Journal</a>
  </div>
  <div id="notes-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:1rem"></div>
</div></div>

<!-- Note modal -->
<div class="modal-overlay" id="note-modal">
  <div class="modal">
    <div class="modal-header"><div class="modal-title" id="modal-title">New Note</div>
      <button class="btn-icon btn" onclick="closeModal()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="form-group"><label class="form-label">Title</label><input type="text" class="form-input" id="note-title" placeholder="Note title…"/></div>
    <div class="form-group"><label class="form-label">Category</label>
      <select class="form-input" id="note-cat"><option value="general">General</option><option value="work">Work</option><option value="personal">Personal</option><option value="idea">Idea</option></select>
    </div>
    <div class="form-group"><label class="form-label">Content</label>
      <textarea class="form-input" id="note-content" rows="6" placeholder="Write your note…" style="resize:vertical"></textarea>
    </div>
    <div style="display:flex;gap:.75rem;margin-top:1rem">
      <button class="btn btn-secondary" style="flex:1" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" style="flex:1" onclick="saveNote()">Save</button>
    </div>
  </div>
</div>

<script>
let notes = JSON.parse(localStorage.getItem('savah:quicknotes')||'[]');
let editId = null;
const COLORS = {work:'var(--blue)',personal:'var(--purple)',idea:'var(--warning)',general:'var(--success)'};

function openNewNote(){editId=null;document.getElementById('modal-title').textContent='New Note';document.getElementById('note-title').value='';document.getElementById('note-content').value='';document.getElementById('note-cat').value='general';openModal('note-modal');}
function closeModal(){closeModal2('note-modal');}
function closeModal2(id){document.getElementById(id).classList.remove('show');document.querySelector('.modal-overlay')?.classList.remove('show');}

function saveNote(){
  const title=document.getElementById('note-title').value.trim();
  const content=document.getElementById('note-content').value.trim();
  const cat=document.getElementById('note-cat').value;
  if(!title&&!content){Toast.show('Write something first','warning');return;}
  if(editId){
    const i=notes.findIndex(n=>n.id===editId);
    if(i>-1)notes[i]={...notes[i],title,content,cat,updated:Date.now()};
  } else {
    notes.unshift({id:Date.now(),title:title||'Untitled',content,cat,pinned:false,created:Date.now(),updated:Date.now()});
  }
  save(); renderNotes(); closeModal2('note-modal'); Toast.show('Note saved','success');
}

function editNote(id){
  const n=notes.find(n=>n.id===id); if(!n)return;
  editId=id;
  document.getElementById('modal-title').textContent='Edit Note';
  document.getElementById('note-title').value=n.title;
  document.getElementById('note-content').value=n.content;
  document.getElementById('note-cat').value=n.cat;
  openModal('note-modal');
}
function deleteNote(id){if(!confirm('Delete this note?'))return;notes=notes.filter(n=>n.id!==id);save();renderNotes();}
function togglePin(id){const i=notes.findIndex(n=>n.id===id);if(i>-1)notes[i].pinned=!notes[i].pinned;save();renderNotes();}
function save(){localStorage.setItem('savah:quicknotes',JSON.stringify(notes));}

function renderNotes(){
  const q=document.getElementById('note-search').value.toLowerCase();
  const f=document.getElementById('note-filter').value;
  let filtered=notes.filter(n=>{
    if(f==='pinned'&&!n.pinned)return false;
    if(f!=='all'&&f!=='pinned'&&n.cat!==f)return false;
    if(q&&!(n.title+n.content).toLowerCase().includes(q))return false;
    return true;
  });
  filtered.sort((a,b)=>(b.pinned-a.pinned)||(b.updated-a.updated));
  document.getElementById('notes-grid').innerHTML=filtered.length?filtered.map(n=>`
    <div style="background:var(--card);border:1px solid var(--glass-border);border-radius:var(--radius);padding:1.25rem;transition:var(--transition);${n.pinned?'border-color:var(--blue);':''}" class="note-card">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:.5rem;margin-bottom:.65rem">
        <div style="display:flex;align-items:center;gap:.5rem">
          ${n.pinned?'<span style="color:var(--blue);font-size:.85rem"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:inline-block;vertical-align:-2px"><line x1="12" y1="17" x2="12" y2="22"/><path d="M5 17h14v-1.76a2 2 0 0 0-1.11-1.79l-1.78-.9A2 2 0 0 1 15 10.76V6h1a2 2 0 0 0 0-4H8a2 2 0 0 0 0 4h1v4.76a2 2 0 0 1-1.11 1.79l-1.78.9A2 2 0 0 0 5 15.24z"/></svg></span>':''}
          <span style="font-size:.68rem;padding:1px 7px;border-radius:20px;font-weight:700;background:rgba(59,130,246,0.12);color:${COLORS[n.cat]||'var(--blue)'}">${n.cat}</span>
        </div>
        <div style="display:flex;gap:.3rem">
          <button class="btn-icon btn" onclick="togglePin(${n.id})" title="${n.pinned?'Unpin':'Pin'}"><svg width="12" height="12" viewBox="0 0 24 24" fill="${n.pinned?'var(--blue)':'none'}" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/></svg></button>
          <button class="btn-icon btn" onclick="editNote(${n.id})"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>
          <button class="btn-icon btn" onclick="deleteNote(${n.id})" style="color:var(--danger)"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6"/></svg></button>
        </div>
      </div>
      <div style="font-weight:700;font-size:.92rem;margin-bottom:.4rem;word-break:break-word">${n.title}</div>
      <div style="font-size:.82rem;color:var(--text-muted);line-height:1.5;word-break:break-word;max-height:100px;overflow:hidden">${n.content||'<em>No content</em>'}</div>
      <div style="font-size:.7rem;color:var(--text-dim);margin-top:.75rem">${new Date(n.updated||n.created).toLocaleString()}</div>
    </div>`).join(''):
    `<div class="empty-state" style="grid-column:1/-1"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/></svg><h3>No notes yet</h3><p>Create your first note above.</p></div>`;
}
renderNotes();
document.addEventListener('DOMContentLoaded',()=>{buildNav();buildFooter();});
</script>
</body>
</html>
