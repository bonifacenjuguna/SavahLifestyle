<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <link rel="stylesheet" href="css/style.css"/>
  <script src="js/app.js" defer></script>
  <script src="js/localAuth.js" defer></script>
<script src="js/nav.js" defer></script>
</head>
<body>
<div id="page-loader"><div class="loader-logo"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>Savah<span>Lifestyle</span></div><div class="loader-bar-wrap"><div class="loader-bar"></div></div></div>
<div class="page">
<div class="container-sm" style="padding-top:2rem;padding-bottom:4rem">
  <div class="page-header">
    <div>
      <h1 class="page-title">Get in <span>Touch</span></h1>
      <p class="page-subtitle">We'd love to hear from you</p>
    </div>
    <a href="index.html" class="nav-back"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>Back</a>
  </div>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:1.25rem;margin-bottom:2rem">
    <a href="https://facebook.com/savahvfx" target="_blank" class="card card-p" style="text-decoration:none;display:flex;align-items:center;gap:1rem;transition:var(--transition)" onmouseover="this.style.borderColor='#1877f2'" onmouseout="this.style.borderColor=''">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="#1877f2"><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/></svg>
      <div><div style="font-weight:700;font-size:.9rem">Facebook</div><div style="font-size:.8rem;color:var(--text-muted)">@savahvfx</div></div>
    </a>
    <a href="https://instagram.com/savahvfx" target="_blank" class="card card-p" style="text-decoration:none;display:flex;align-items:center;gap:1rem" onmouseover="this.style.borderColor='#e1306c'" onmouseout="this.style.borderColor=''">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#e1306c" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg>
      <div><div style="font-weight:700;font-size:.9rem">Instagram</div><div style="font-size:.8rem;color:var(--text-muted)">@savahvfx</div></div>
    </a>
    <a href="https://t.me/savahvfx" target="_blank" class="card card-p" style="text-decoration:none;display:flex;align-items:center;gap:1rem" onmouseover="this.style.borderColor='#229ed9'" onmouseout="this.style.borderColor=''">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="#229ed9"><path d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0a12 12 0 0 0-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z"/></svg>
      <div><div style="font-weight:700;font-size:.9rem">Telegram</div><div style="font-size:.8rem;color:var(--text-muted)">@savahvfx</div></div>
    </a>
    <a href="https://youtube.com/@savahvfx" target="_blank" class="card card-p" style="text-decoration:none;display:flex;align-items:center;gap:1rem" onmouseover="this.style.borderColor='#ff0000'" onmouseout="this.style.borderColor=''">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="#ff0000"><path d="M22.54 6.42a2.78 2.78 0 0 0-1.95-1.96C18.88 4 12 4 12 4s-6.88 0-8.59.46a2.78 2.78 0 0 0-1.95 1.96A29 29 0 0 0 1 12a29 29 0 0 0 .46 5.58A2.78 2.78 0 0 0 3.41 19.54C5.12 20 12 20 12 20s6.88 0 8.59-.46a2.78 2.78 0 0 0 1.95-1.96A29 29 0 0 0 23 12a29 29 0 0 0-.46-5.58z"/><polygon fill="white" points="9.75 15.02 15.5 12 9.75 8.98 9.75 15.02"/></svg>
      <div><div style="font-weight:700;font-size:.9rem">YouTube</div><div style="font-size:.8rem;color:var(--text-muted)">@savahvfx</div></div>
    </a>
  </div>

  <div class="card card-p">
    <h2 class="card-title">Send a Message</h2>
    <div class="form-group">
      <label class="form-label">Your Name</label>
      <input type="text" class="form-input" id="ct-name" placeholder="Your name"/>
    </div>
    <div class="form-group">
      <label class="form-label">Email</label>
      <input type="email" class="form-input" id="ct-email" placeholder="your@email.com"/>
    </div>
    <div class="form-group">
      <label class="form-label">Subject</label>
      <select class="form-select" id="ct-subject">
        <option>General Inquiry</option>
        <option>Technical Support</option>
        <option>Bug Report</option>
        <option>Feature Request</option>
        <option>Partnership</option>
        <option>Other</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Message</label>
      <textarea class="form-textarea" id="ct-msg" placeholder="Write your message here..." style="min-height:140px"></textarea>
    </div>
    <button class="btn btn-primary" onclick="submitContact()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      Send Message
    </button>
  </div>
</div>
</div>
<script>
async function submitContact() {
  const name  = document.getElementById('ct-name').value.trim();
  const email = document.getElementById('ct-email').value.trim();
  const subj  = document.getElementById('ct-subject').value;
  const msg   = document.getElementById('ct-msg').value.trim();
  if (!name || !email || !msg) { Toast.show('Please fill all fields','warning'); return; }
  if (Auth.isLoggedIn()) {
    await API.saveData('contact_'+Date.now(), { name, email, subject: subj, message: msg, ts: new Date().toISOString() });
  }
  Toast.show('Message sent! We\'ll get back to you soon.','success');
  ['ct-name','ct-email','ct-msg'].forEach(id => document.getElementById(id).value = '');
}
document.addEventListener('DOMContentLoaded', () => { buildNav(); buildFooter(); });
</script>
</body>
</html>
