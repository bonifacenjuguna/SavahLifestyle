<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Brain Dump — SavahLifestyle</title>
  <link rel="stylesheet" href="css/style.css"/>
  <script src="js/app.js" defer></script>
  <script src="js/localAuth.js" defer></script>
<script src="js/nav.js" defer></script>
  
  
  <style>
    .dump-area { width:100%; min-height:calc(100vh - 280px); background:var(--card); border:1px solid var(--border); border-radius:var(--radius-lg); padding:2rem; font-family:var(--font-body); font-size:1rem; color:var(--text); resize:none; line-height:1.8; transition:var(--transition); }
    .dump-area:focus { border-color:var(--border-accent); box-shadow:0 0 0 3px rgba(240,180,41,0.08); outline:none; }
    .save-indicator { font-size:0.78rem; color:var(--text-muted); display:flex; align-items:center; gap:0.4rem; }
    .save-dot { width:7px; height:7px; border-radius:50%; background:var(--success); }
  </style>
</head>
<body>
<nav class="nav">
  <a href="index.html" class="nav-logo"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>Savah<span>Lifestyle</span></a>
  <div class="nav-actions">
    <a href="index.html" class="nav-back"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg> <span>Dashboard</span></a>
    <button class="theme-toggle" id="theme-toggle"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/></svg></button>
  </div>
</nav>
<div class="page"><div class="container-sm">
  <div class="page-header">
    <div><h1 class="page-title">Brain <span>Dump</span></h1><p class="page-subtitle">Write freely — capture thoughts before they disappear</p></div>
    <div style="display:flex;align-items:center;gap:1rem;">
      <div class="save-indicator"><div class="save-dot"></div><span id="save-status">Auto-saved</span></div>
      <button class="btn btn-secondary" onclick="clearDump()">Clear</button>
    </div>
  </div>
  <div style="display:flex;gap:1rem;margin-bottom:1rem;flex-wrap:wrap">
    <div class="stat-card" style="flex:1"><div><div class="stat-value text-gold" id="word-count">0</div><div class="stat-label">Words</div></div></div>
    <div class="stat-card" style="flex:1"><div><div class="stat-value text-gold" id="char-count">0</div><div class="stat-label">Characters</div></div></div>
    <div class="stat-card" style="flex:1"><div><div class="stat-value text-gold" id="line-count">0</div><div class="stat-label">Lines</div></div></div>
  </div>
  <textarea class="dump-area" id="dump" placeholder="Just start writing... let your thoughts flow without judgment. There's no structure needed here — just capture everything on your mind.&#10;&#10;<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:inline-block;vertical-align:-2px"><path d="M9.5 2A2.5 2.5 0 0 1 12 4.5v15a2.5 2.5 0 0 1-4.96-.46"/></svg> What's been on your mind?&#10;<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:inline-block;vertical-align:-2px"><line x1="12" y1="2" x2="12" y2="6"/><circle cx="12" cy="12" r="4"/></svg> Any ideas you've been meaning to write down?&#10;<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:inline-block;vertical-align:-2px"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg> Goals, worries, plans, dreams — anything goes."></textarea>
</div></div>
<script>
const dump = document.getElementById('dump');
dump.value = localStorage.getItem('savah:braindump') || '';
updateCounts();
let saveTimer;
dump.addEventListener('input', () => {
  clearTimeout(saveTimer);
  document.getElementById('save-status').textContent = 'Saving...';
  updateCounts();
  saveTimer = setTimeout(() => {
    localStorage.setItem('savah:braindump', dump.value);
    document.getElementById('save-status').textContent = 'Auto-saved ' + new Date().toLocaleTimeString('en-US', {hour:'2-digit',minute:'2-digit'});
  }, 800);
});
function updateCounts() {
  const text = dump.value;
  document.getElementById('word-count').textContent = text.trim() ? text.trim().split(/\s+/).length : 0;
  document.getElementById('char-count').textContent = text.length;
  document.getElementById('line-count').textContent = text ? text.split('\n').length : 0;
}
function clearDump() {
  if (!dump.value.trim()) return;
  if (confirm('Clear the brain dump? This cannot be undone.')) {
    dump.value = '';
    localStorage.removeItem('savah:braindump');
    updateCounts();
    Toast.show('Cleared', 'info');
  }
}
</script>
</body></html>
