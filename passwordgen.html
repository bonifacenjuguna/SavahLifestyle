<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Password Generator — SavahLifestyle</title>
  <link rel="stylesheet" href="css/style.css"/>
  <script src="js/app.js" defer></script>
  <script src="js/localAuth.js" defer></script>
<script src="js/nav.js" defer></script>
  
  
  <style>
    .password-display { font-family:var(--font-mono); font-size:1.2rem; color:var(--text); background:var(--bg); border:1px solid var(--border-accent); border-radius:var(--radius-sm); padding:1.1rem 1.25rem; letter-spacing:0.05em; word-break:break-all; text-align:center; min-height:60px; display:flex; align-items:center; justify-content:center; }
    .strength-bar { height:6px; border-radius:3px; background:var(--bg3); margin:0.75rem 0 0.3rem; overflow:hidden; }
    .strength-fill { height:100%; border-radius:3px; transition:all 0.3s ease; }
  </style>
</head>
<body>
<nav class="nav">
  <a href="index.html" class="nav-logo"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>Savah<span>Lifestyle</span></a>
  <div class="nav-actions">
    <a href="index.html" class="nav-back"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg> <span>Dashboard</span></a>
    <button class="theme-toggle" id="theme-toggle"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/></svg></button>
  </div>
</nav>
<div class="page"><div class="container-sm">
  <div class="page-header"><div><h1 class="page-title">Password <span>Generator</span></h1><p class="page-subtitle">Generate strong, secure passwords instantly</p></div></div>
  <div class="card card-gold" style="max-width:560px;margin:0 auto">
    <div class="password-display" id="pwd-display">Click Generate</div>
    <div class="strength-bar"><div class="strength-fill" id="strength-fill" style="width:0%"></div></div>
    <div style="display:flex;justify-content:space-between;font-size:0.78rem;color:var(--text-muted);margin-bottom:1.5rem">
      <span id="strength-label">—</span>
      <span id="pwd-entropy">0 bits entropy</span>
    </div>
    <div class="form-group"><label class="form-label">Length — <span id="len-label">16</span> characters</label><input type="range" id="pwd-len" min="6" max="128" value="16" oninput="document.getElementById('len-label').textContent=this.value;generate()" /></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;margin-bottom:1.5rem">
      <label style="display:flex;align-items:center;gap:0.5rem;font-size:0.88rem;cursor:pointer"><input type="checkbox" id="opt-upper" checked onchange="generate()" /> Uppercase (A-Z)</label>
      <label style="display:flex;align-items:center;gap:0.5rem;font-size:0.88rem;cursor:pointer"><input type="checkbox" id="opt-lower" checked onchange="generate()" /> Lowercase (a-z)</label>
      <label style="display:flex;align-items:center;gap:0.5rem;font-size:0.88rem;cursor:pointer"><input type="checkbox" id="opt-num" checked onchange="generate()" /> Numbers (0-9)</label>
      <label style="display:flex;align-items:center;gap:0.5rem;font-size:0.88rem;cursor:pointer"><input type="checkbox" id="opt-sym" checked onchange="generate()" /> Symbols (!@#$)</label>
      <label style="display:flex;align-items:center;gap:0.5rem;font-size:0.88rem;cursor:pointer"><input type="checkbox" id="opt-ambiguous" onchange="generate()" /> Exclude ambiguous</label>
    </div>
    <div style="display:flex;gap:0.75rem">
      <button class="btn btn-primary" style="flex:2" onclick="generate()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 102.13-9.36L1 10"/></svg>
        Generate
      </button>
      <button class="btn btn-secondary" style="flex:1" onclick="copyPwd()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
        Copy
      </button>
    </div>
    <div style="margin-top:1.5rem">
      <div class="section-title">Recent Passwords</div>
      <div id="pwd-history" style="display:flex;flex-direction:column;gap:0.4rem;max-height:180px;overflow-y:auto"></div>
    </div>
  </div>
</div></div>
<script>
let pwdHistory = [];
function generate() {
  const len = parseInt(document.getElementById('pwd-len').value);
  let charset = '';
  const upper='ABCDEFGHIJKLMNOPQRSTUVWXYZ', lower='abcdefghijklmnopqrstuvwxyz', nums='0123456789', syms='!@#$%^&*()_+-=[]{}|;:,.<>?';
  const ambiguous=/[0Ol1I]/g;
  if(document.getElementById('opt-upper').checked) charset += upper;
  if(document.getElementById('opt-lower').checked) charset += lower;
  if(document.getElementById('opt-num').checked) charset += nums;
  if(document.getElementById('opt-sym').checked) charset += syms;
  if(document.getElementById('opt-ambiguous').checked) charset = charset.replace(ambiguous,'');
  if(!charset) { Toast.show('Select at least one character type','warning'); return; }
  const arr = new Uint8Array(len);
  window.crypto.getRandomValues(arr);
  const pwd = Array.from(arr).map(b => charset[b % charset.length]).join('');
  document.getElementById('pwd-display').textContent = pwd;
  const entropy = Math.log2(Math.pow(charset.length, len));
  document.getElementById('pwd-entropy').textContent = Math.round(entropy) + ' bits entropy';
  let strength, color, pct;
  if(entropy < 28) { strength='Very Weak'; color='var(--danger)'; pct=15; }
  else if(entropy < 40) { strength='Weak'; color='#f59e0b'; pct=30; }
  else if(entropy < 60) { strength='Fair'; color='#fbbf24'; pct=50; }
  else if(entropy < 80) { strength='Strong'; color='#22c55e'; pct=75; }
  else { strength='Very Strong'; color='#10b981'; pct=100; }
  document.getElementById('strength-label').textContent = strength;
  document.getElementById('strength-label').style.color = color;
  document.getElementById('strength-fill').style.width = pct+'%';
  document.getElementById('strength-fill').style.background = color;
  if(pwdHistory.length === 0 || pwdHistory[0] !== pwd) {
    pwdHistory.unshift(pwd);
    if(pwdHistory.length > 6) pwdHistory.pop();
    renderHistory();
  }
}
function copyPwd() {
  const pwd = document.getElementById('pwd-display').textContent;
  if(pwd === 'Click Generate') return;
  navigator.clipboard.writeText(pwd).then(() => Toast.show('Password copied!','success'));
}
function renderHistory() {
  document.getElementById('pwd-history').innerHTML = pwdHistory.map(p => `
    <div style="display:flex;align-items:center;gap:0.5rem;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:0.5rem 0.75rem">
      <div style="font-family:var(--font-mono);font-size:0.78rem;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text)">${p}</div>
      <button class="btn-icon btn" onclick="navigator.clipboard.writeText('${p}').then(()=>Toast.show('Copied','success'))" title="Copy"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg></button>
    </div>
  `).join('');
}
generate();
</script>
</body></html>
