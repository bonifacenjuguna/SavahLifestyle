<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Idea Generator — SavahLifestyle</title>
<link rel="stylesheet" href="css/style.css"/>
<style>.idea-card{min-height:200px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:1rem}.idea-text{font-family:var(--font-head);font-size:1.5rem;font-weight:800;color:var(--text);max-width:500px;line-height:1.4}.idea-emoji{font-size:3.5rem;animation:float 3s ease-in-out infinite}</style>
<script src="js/app.js" defer></script>
<script src="js/localAuth.js" defer></script>
<script src="js/nav.js" defer></script>
</head>
<body>
<div class="page"><div class="container-sm">
  <div class="page-header"><div><h1 class="page-title">Idea <span>Generator</span></h1><p class="page-subtitle">Beat procrastination with a quick productive action</p></div></div>
  <div class="tabs" style="max-width:500px;margin-bottom:1.5rem" id="cat-tabs">
    <button class="tab active" onclick="setIdCat('all',this)">All</button>
    <button class="tab" onclick="setIdCat('productivity',this)"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:inline-block;vertical-align:-2px"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg> Productivity</button>
    <button class="tab" onclick="setIdCat('creative',this)"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:inline-block;vertical-align:-2px"><circle cx="13.5" cy="6.5" r="0.5"/><circle cx="17.5" cy="10.5" r="0.5"/><circle cx="8.5" cy="7.5" r="0.5"/><circle cx="6.5" cy="12.5" r="0.5"/><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.926 0 1.648-.746 1.648-1.688 0-.437-.18-.835-.437-1.125-.29-.289-.438-.652-.438-1.125a1.64 1.64 0 0 1 1.668-1.668h1.996c3.051 0 5.555-2.503 5.555-5.554C21.965 6.012 17.461 2 12 2z"/></svg> Creative</button>
    <button class="tab" onclick="setIdCat('health',this)"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:inline-block;vertical-align:-2px"><path d="M12.5 3.5a3.5 3.5 0 0 1 5 5l-7 7-5-5 7-7z"/><path d="M3.5 16.5l4 4"/></svg> Health</button>
    <button class="tab" onclick="setIdCat('learning',this)"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:inline-block;vertical-align:-2px"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg> Learning</button>
  </div>
  <div class="card card-gold idea-card" id="idea-card">
    <div class="idea-emoji" id="idea-emoji"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:inline-block;vertical-align:-2px"><line x1="12" y1="2" x2="12" y2="6"/><circle cx="12" cy="12" r="4"/></svg></div>
    <div class="idea-text" id="idea-text">Click Generate for your next action!</div>
    <span class="badge badge-gold" id="idea-cat-badge">Ready</span>
  </div>
  <div style="display:flex;justify-content:center;gap:0.75rem;margin-top:1.5rem;flex-wrap:wrap">
    <button class="btn btn-primary" onclick="generateIdea()" style="min-width:140px">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 102.13-9.36L1 10"/></svg>
      Generate
    </button>
    <button class="btn btn-secondary" onclick="markDone()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="display:inline-block;vertical-align:-2px;color:var(--green)"><polyline points="20 6 9 17 4 12"/></svg> Mark Done</button>
  </div>
  <div style="margin-top:2rem">
    <div class="section-title">Recently Generated</div>
    <div id="idea-history"></div>
  </div>
</div></div>
<script>
const ideas=[
  {text:"Write 200 words of free journaling",emoji:"<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:inline-block;vertical-align:-2px"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>️",cat:"creative"},
  {text:"Do 10 minutes of stretching or yoga",emoji:"<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:inline-block;vertical-align:-2px"><circle cx="12" cy="5" r="1"/><path d="M12 6v6l-3 3"/><path d="M9 9h6"/><path d="M15 15l-3-3"/><path d="M3 18h18"/></svg>",cat:"health"},
  {text:"Organize your desktop and downloads folder",emoji:"🗂️",cat:"productivity"},
  {text:"Read one chapter of a book",emoji:"<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:inline-block;vertical-align:-2px"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>",cat:"learning"},
  {text:"Write down 3 things you're grateful for",emoji:"🙏",cat:"creative"},
  {text:"Go for a 15-minute walk outside",emoji:"🚶",cat:"health"},
  {text:"Clear your email inbox of 10 emails",emoji:"📧",cat:"productivity"},
  {text:"Learn one new fact about a topic you're curious about",emoji:"🔍",cat:"learning"},
  {text:"Do 20 pushups or squats right now",emoji:"<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:inline-block;vertical-align:-2px"><path d="M12.5 3.5a3.5 3.5 0 0 1 5 5l-7 7-5-5 7-7z"/><path d="M3.5 16.5l4 4"/></svg>",cat:"health"},
  {text:"Write a thank you message to someone",emoji:"💌",cat:"creative"},
  {text:"Review your goals and update progress",emoji:"<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:inline-block;vertical-align:-2px"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>",cat:"productivity"},
  {text:"Watch a 10-minute educational video",emoji:"🎥",cat:"learning"},
  {text:"Drink a full glass of water",emoji:"<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:inline-block;vertical-align:-2px"><path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"/></svg>",cat:"health"},
  {text:"Sketch or doodle something — anything",emoji:"✏️",cat:"creative"},
  {text:"Review your finances for 10 minutes",emoji:"<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:inline-block;vertical-align:-2px"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>",cat:"productivity"},
  {text:"Learn 5 new vocabulary words",emoji:"📝",cat:"learning"},
  {text:"Plan tomorrow's top 3 tasks",emoji:"📋",cat:"productivity"},
  {text:"Take 10 deep breaths and reset your focus",emoji:"🌬️",cat:"health"},
  {text:"Call or message someone you haven't spoken to in a while",emoji:"📞",cat:"creative"},
  {text:"Watch a TED talk on a topic you know nothing about",emoji:"🎙️",cat:"learning"},
];
let idCat='all', idHistory=[];
function setIdCat(cat,btn){idCat=cat;document.querySelectorAll('#cat-tabs .tab').forEach(b=>b.classList.remove('active'));btn.classList.add('active');}
function getFiltered(){return idCat==='all'?ideas:ideas.filter(i=>i.cat===idCat);}
function generateIdea(){
  const filtered=getFiltered();
  const idea=filtered[Math.floor(Math.random()*filtered.length)];
  const card=document.getElementById('idea-card');
  card.style.opacity='0';
  setTimeout(()=>{
    document.getElementById('idea-text').textContent=idea.text;
    document.getElementById('idea-emoji').textContent=idea.emoji;
    document.getElementById('idea-cat-badge').textContent=idea.cat.charAt(0).toUpperCase()+idea.cat.slice(1);
    card.style.opacity='1';
  },200);
  card.style.transition='opacity 0.2s';
  idHistory.unshift(idea);
  if(idHistory.length>6) idHistory.pop();
  renderHistory();
}
function markDone(){Toast.show('Great job! You completed it! <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:inline-block;vertical-align:-2px"><path d="M20.2 7.8l-7.7 7.7-4-4-5.7 5.7"/><path d="M15 7h5v5"/></svg>','success',3000);generateIdea();}
function renderHistory(){
  if(!idHistory.length)return;
  document.getElementById('idea-history').innerHTML=idHistory.map(i=>`
    <div style="display:flex;align-items:center;gap:0.75rem;padding:0.65rem 1rem;background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:0.4rem;font-size:0.85rem;color:var(--text-muted)">
      <span style="font-size:1.1rem">${i.emoji}</span> ${i.text}
    </div>`).join('');
}
</script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  buildNav('ideas');
  buildFooter();
});
</script>
</body></html>
