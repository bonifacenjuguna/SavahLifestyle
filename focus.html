<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="theme-color" content="#060810" media="(prefers-color-scheme: dark)"/>
  <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)"/>
  <meta name="description" content="Boost your productivity with SavahLifestyle Focus Mode."/>
  <meta name="keywords" content="productivity, lifestyle, wellness, tasks, focus, journal, SavahLifestyle"/>
  <meta name="author" content="SavahLifestyle"/>

  <meta property="og:title" content="Focus Mode — SavahLifestyle"/>
  <meta property="og:description" content="Boost your productivity with SavahLifestyle Focus Mode."/>
  <meta property="og:type" content="website"/>
  <meta property="og:site_name" content="SavahLifestyle"/>
  <meta name="twitter:card" content="summary"/>
  <meta name="twitter:title" content="Focus Mode — SavahLifestyle"/>
  <meta name="twitter:description" content="Boost your productivity with SavahLifestyle Focus Mode."/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>

  <title>Focus Timer — SavahLifestyle</title>
  <link rel="stylesheet" href="css/style.css"/>
  <script src="js/app.js" defer></script>
  <script src="js/localAuth.js" defer></script>
<script src="js/nav.js" defer></script>
  
  
  <style>
    .timer-display {
      position: relative; width: 280px; height: 280px;
      margin: 0 auto 2rem;
    }
    .timer-svg { width: 100%; height: 100%; transform: rotate(-90deg); }
    .timer-bg-circle { fill: none; stroke: var(--bg3); stroke-width: 8; }
    .timer-progress { fill: none; stroke: var(--blue); stroke-width: 8; stroke-linecap: round; transition: stroke-dashoffset 1s linear, stroke 0.5s; }
    .timer-progress.break { stroke: var(--success); }
    .timer-center {
      position: absolute; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
    }
    .timer-time {
      font-family: var(--font-head); font-size: 3.5rem; font-weight: 800;
      color: var(--text); line-height: 1; font-variant-numeric: tabular-nums;
    }
    .timer-label { font-size: 0.8rem; color: var(--text-muted); margin-top: 0.3rem; text-transform: uppercase; letter-spacing: 0.1em; }
    .timer-controls { display: flex; justify-content: center; gap: 0.75rem; margin-bottom: 2rem; }
    .session-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--border); }
    .session-dot.done { background: var(--blue); }
    .preset-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.75rem; max-width: 400px; margin: 0 auto; }
    .preset-btn { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 0.75rem; text-align: center; cursor: pointer; transition: var(--transition); }
    .preset-btn:hover, .preset-btn.active { border-color: var(--border-accent); background: var(--blue-dim); }
    .preset-name { font-family: var(--font-head); font-weight: 700; font-size: 0.85rem; color: var(--text); }
    .preset-time { font-size: 0.75rem; color: var(--text-muted); margin-top: 0.2rem; }
  </style>
</head>
<body>
<nav class="nav">
  <a href="index.html" class="nav-logo"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>Savah<span>Lifestyle</span></a>
  <div class="nav-actions">
    <a href="index.html" class="nav-back"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>Dashboard</a>
    <button class="theme-toggle" id="theme-toggle"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/></svg></button>
  </div>
</nav>
<div class="page"><div class="container-sm">
  <div class="page-header">
    <div><h1 class="page-title">Focus <span>Timer</span></h1><p class="page-subtitle">Deep work sessions with the Pomodoro technique</p></div>
  </div>

  <!-- Stats Row -->
  <div class="grid-4" style="margin-bottom:2.5rem" id="focus-stats"></div>

  <!-- Timer -->
  <div style="text-align:center;max-width:400px;margin:0 auto">
    <div class="timer-display">
      <svg class="timer-svg" viewBox="0 0 280 280">
        <circle class="timer-bg-circle" cx="140" cy="140" r="130"/>
        <circle class="timer-progress" id="progress-ring" cx="140" cy="140" r="130" stroke-dasharray="816.8" stroke-dashoffset="0"/>
      </svg>
      <div class="timer-center">
        <div class="timer-time" id="timer-display">25:00</div>
        <div class="timer-label" id="timer-label">Focus Session</div>
        <div style="font-size:0.75rem;color:var(--text-dim);margin-top:0.3rem" id="session-counter">Session 1 of 4</div>
      </div>
    </div>

    <!-- Session dots -->
    <div style="display:flex;justify-content:center;gap:0.5rem;margin-bottom:2rem" id="session-dots"></div>

    <!-- Controls -->
    <div class="timer-controls">
      <button class="btn btn-secondary btn-icon" onclick="resetTimer()" title="Reset">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 102.13-9.36L1 10"/></svg>
      </button>
      <button class="btn btn-primary" id="start-btn" onclick="toggleTimer()" style="min-width:120px;height:48px;font-size:1rem">
        <svg id="start-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        Start
      </button>
      <button class="btn btn-secondary btn-icon" onclick="skipSession()" title="Skip">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
      </button>
    </div>

    <!-- Presets -->
    <div class="preset-grid" style="margin-bottom:2rem">
      <div class="preset-btn active" onclick="setPreset(25, 5, 'Pomodoro', this)"><div class="preset-name">Pomodoro</div><div class="preset-time">25m / 5m break</div></div>
      <div class="preset-btn" onclick="setPreset(50, 10, 'Deep Work', this)"><div class="preset-name">Deep Work</div><div class="preset-time">50m / 10m break</div></div>
      <div class="preset-btn" onclick="setPreset(90, 20, 'Flow State', this)"><div class="preset-name">Flow State</div><div class="preset-time">90m / 20m break</div></div>
      <div class="preset-btn" onclick="setPreset(15, 3, 'Sprint', this)"><div class="preset-name">Sprint</div><div class="preset-time">15m / 3m break</div></div>
      <div class="preset-btn" onclick="setPreset(45, 15, 'Study', this)"><div class="preset-name">Study</div><div class="preset-time">45m / 15m break</div></div>
      <div class="preset-btn" onclick="customTimer()"><div class="preset-name">Custom</div><div class="preset-time">Set your own</div></div>
    </div>
  </div>
</div></div>

<script>
let timerInterval = null;
let totalSeconds = 25 * 60;
let secondsLeft = totalSeconds;
let isRunning = false;
let isBreak = false;
let sessionNum = 1;
let focusMins = 0;
let sessionsCompleted = parseInt(localStorage.getItem('savah:sessions-today') || '0');
let totalFocusToday = parseInt(localStorage.getItem('savah:focus-today') || '0');
let presetFocus = 25, presetBreak = 5, presetName = 'Pomodoro';
const circumference = 2 * Math.PI * 130;

function updateStats() {
  document.getElementById('focus-stats').innerHTML = [
    { label: 'Sessions Today', value: sessionsCompleted, color: 'var(--blue)' },
    { label: 'Focus Minutes', value: totalFocusToday, color: '#3b82f6' },
    { label: 'Total Sessions', value: parseInt(localStorage.getItem('savah:total-sessions') || '0'), color: '#a855f7' },
    { label: 'Current Streak', value: parseInt(localStorage.getItem('savah:focus-streak') || '0') + ' days', color: 'var(--success)' },
  ].map(s => `<div class="stat-card"><div><div class="stat-value" style="color:${s.color}">${s.value}</div><div class="stat-label">${s.label}</div></div></div>`).join('');
}

function renderDots() {
  const dots = document.getElementById('session-dots');
  dots.innerHTML = Array.from({length:4}, (_, i) => `<div class="session-dot ${i < sessionsCompleted % 4 ? 'done' : ''}"></div>`).join('');
}

function updateDisplay() {
  const m = Math.floor(secondsLeft / 60).toString().padStart(2, '0');
  const s = (secondsLeft % 60).toString().padStart(2, '0');
  document.getElementById('timer-display').textContent = `${m}:${s}`;
  document.getElementById('timer-label').textContent = isBreak ? 'Break Time <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:inline-block;vertical-align:-2px"><path d="M2 20c0 0 4-4 8-4 4 0 6-3 6-3s2 0 4-4c-2 0-4 1-6 2-2-4-4-4-8-4 0 5 4 6 4 6"/></svg>' : `${presetName} <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:inline-block;vertical-align:-2px"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>`;
  document.getElementById('session-counter').textContent = isBreak ? 'Rest up!' : `Session ${sessionNum} of 4`;
  document.title = `${m}:${s} — ${isBreak ? 'Break' : 'Focus'}`;

  const offset = circumference - (circumference * (1 - secondsLeft / totalSeconds));
  const ring = document.getElementById('progress-ring');
  ring.style.strokeDashoffset = offset;
  ring.className = `timer-progress${isBreak ? ' break' : ''}`;
}

function toggleTimer() {
  if (isRunning) {
    clearInterval(timerInterval);
    isRunning = false;
    document.getElementById('start-btn').innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="5 3 19 12 5 21 5 3"/></svg> Resume';
  } else {
    isRunning = true;
    document.getElementById('start-btn').innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg> Pause';
    timerInterval = setInterval(() => {
      if (secondsLeft > 0) {
        secondsLeft--;
        if (!isBreak) { focusMins = Math.floor((totalSeconds - secondsLeft) / 60); }
        updateDisplay();
      } else {
        clearInterval(timerInterval);
        isRunning = false;
        sessionComplete();
      }
    }, 1000);
  }
}

function sessionComplete() {
  if (!isBreak) {
    sessionsCompleted++;
    totalFocusToday += presetFocus;
    localStorage.setItem('savah:sessions-today', sessionsCompleted);
    localStorage.setItem('savah:focus-today', totalFocusToday);
    const total = parseInt(localStorage.getItem('savah:total-sessions') || '0') + 1;
    localStorage.setItem('savah:total-sessions', total);
    Toast.show('Focus session complete! Time for a break <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:inline-block;vertical-align:-2px"><path d="M20.2 7.8l-7.7 7.7-4-4-5.7 5.7"/><path d="M15 7h5v5"/></svg>', 'success', 4000);
    document.getElementById('start-btn').innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="5 3 19 12 5 21 5 3"/></svg> Start Break';
    isBreak = true;
    totalSeconds = presetBreak * 60;
    secondsLeft = totalSeconds;
  } else {
    Toast.show('Break over! Ready to focus again?', 'info', 3000);
    isBreak = false;
    sessionNum++;
    if (sessionNum > 4) { sessionNum = 1; }
    totalSeconds = presetFocus * 60;
    secondsLeft = totalSeconds;
    document.getElementById('start-btn').innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="5 3 19 12 5 21 5 3"/></svg> Start';
  }
  renderDots(); updateStats(); updateDisplay();
  playChime();
}

function playChime() {
  try {
    const ctx = new AudioContext();
    const o = ctx.createOscillator(); const g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.frequency.setValueAtTime(880, ctx.currentTime);
    o.frequency.setValueAtTime(1100, ctx.currentTime + 0.2);
    g.gain.setValueAtTime(0.3, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.8);
    o.start(ctx.currentTime); o.stop(ctx.currentTime + 0.8);
  } catch(e) {}
}

function resetTimer() {
  clearInterval(timerInterval); isRunning = false; isBreak = false;
  secondsLeft = presetFocus * 60; totalSeconds = secondsLeft;
  document.getElementById('start-btn').innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="5 3 19 12 5 21 5 3"/></svg> Start';
  document.title = 'Focus Timer — SavahLifestyle';
  updateDisplay();
}

function skipSession() {
  clearInterval(timerInterval); isRunning = false;
  sessionComplete();
}

function setPreset(focus, breakMin, name, btn) {
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  presetFocus = focus; presetBreak = breakMin; presetName = name;
  resetTimer();
}

function customTimer() {
  const mins = parseInt(prompt('Focus duration (minutes):', '25'));
  const brk = parseInt(prompt('Break duration (minutes):', '5'));
  if (isNaN(mins) || isNaN(brk) || mins < 1 || brk < 1) return;
  presetFocus = mins; presetBreak = brk; presetName = 'Custom';
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
  resetTimer();
}

updateStats(); renderDots(); updateDisplay();
</script>
</body>
</html>
