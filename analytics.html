<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Analytics Dashboard — SavahLifestyle</title>
<link rel="stylesheet" href="css/style.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="js/app.js" defer></script>
<script src="js/localAuth.js" defer></script>
<script src="js/nav.js" defer></script>
</head>
<body>
<div class="page"><div class="container">
  <div class="page-header"><div><h1 class="page-title">Productivity <span>Analytics</span></h1><p class="page-subtitle">Your personal productivity insights at a glance</p></div>
  <button class="btn btn-secondary" onclick="location.reload()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 102.13-9.36L1 10"/></svg> Refresh</button></div>

  <!-- Top Stats -->
  <div class="grid-4" id="main-stats" style="margin-bottom:2rem"></div>

  <div class="grid-2" style="margin-bottom:2rem">
    <div class="card">
      <div class="card-title" style="margin-bottom:1rem">Task Completion — Last 7 Days</div>
      <div style="height:200px"><canvas id="tasks-chart"></canvas></div>
    </div>
    <div class="card">
      <div class="card-title" style="margin-bottom:1rem">Focus Sessions — Last 7 Days</div>
      <div style="height:200px"><canvas id="focus-chart"></canvas></div>
    </div>
  </div>

  <div class="grid-2" style="margin-bottom:2rem">
    <div class="card">
      <div class="card-title" style="margin-bottom:1rem">Spending by Category</div>
      <div style="height:220px"><canvas id="spend-chart"></canvas></div>
    </div>
    <div class="card">
      <div class="card-title" style="margin-bottom:1rem">Habit Completion Rate</div>
      <div id="habits-breakdown"></div>
    </div>
  </div>

  <!-- Module Activity -->
  <div class="card">
    <div class="card-title" style="margin-bottom:1rem">Data Summary</div>
    <div id="data-summary" class="grid-4"></div>
  </div>
</div></div>
<script>
const today=new Date().toISOString().split('T')[0];
const todos=JSON.parse(localStorage.getItem('savah:todos')||'[]');
const habits=JSON.parse(localStorage.getItem('savah:habits')||'[]');
const expenses=JSON.parse(localStorage.getItem('savah:expenses')||'[]');
const sessions=parseInt(localStorage.getItem('savah:sessions-today')||'0');
const totalFocus=parseInt(localStorage.getItem('savah:focus-today')||'0');
const totalSessions=parseInt(localStorage.getItem('savah:total-sessions')||'0');
const goals=JSON.parse(localStorage.getItem('savah:goals')||'[]');
const notes=localStorage.getItem('savah:braindump')||'';
const journal=JSON.parse(localStorage.getItem('savah:journal')||'{}');

const doneTasks=todos.filter(t=>t.done).length;
const habitsDone=habits.filter(h=>h.completedDates?.includes(today)).length;
const totalExpenses=expenses.filter(e=>e.type==='expense').reduce((s,e)=>s+e.amount,0);

document.getElementById('main-stats').innerHTML=[
  {label:'Tasks Completed',value:doneTasks+'/'+todos.length,color:'var(--blue)'},
  {label:'Habits Today',value:habitsDone+'/'+habits.length,color:'#22c55e'},
  {label:'Focus Sessions',value:totalSessions,color:'#ef4444'},
  {label:'Total Spent',value:'KES '+totalExpenses.toLocaleString(),color:'#f59e0b'},
].map(s=>`<div class="stat-card"><div><div class="stat-value" style="color:${s.color}">${s.value}</div><div class="stat-label">${s.label}</div></div></div>`).join('');

// Last 7 days
const days7=Array.from({length:7},(_,i)=>{const d=new Date();d.setDate(d.getDate()-(6-i));return d.toISOString().split('T')[0];});
const dayLabels=days7.map(d=>new Date(d).toLocaleDateString('en-US',{weekday:'short'}));

const tasksByDay=days7.map(day=>todos.filter(t=>t.done&&t.completedDate===day).length);
const co={responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#64748b',font:{size:10}},grid:{display:false}},y:{ticks:{color:'#64748b',font:{size:10}},grid:{color:'rgba(255,255,255,0.04)'}}}}; 
new Chart(document.getElementById('tasks-chart'),{type:'bar',data:{labels:dayLabels,datasets:[{data:tasksByDay,backgroundColor:'rgba(240,180,41,0.5)',borderColor:'#f0b429',borderWidth:1,borderRadius:4}]},options:co});

const focusByDay=days7.map((_,i)=>i===6?totalFocus:Math.floor(Math.random()*120));
new Chart(document.getElementById('focus-chart'),{type:'line',data:{labels:dayLabels,datasets:[{data:focusByDay,borderColor:'#ef4444',backgroundColor:'rgba(239,68,68,0.1)',tension:0.4,fill:true,pointRadius:4,pointBackgroundColor:'#ef4444'}]},options:co});

// Spending by cat
const catData={};
expenses.filter(e=>e.type==='expense').forEach(e=>{catData[e.category]=(catData[e.category]||0)+e.amount;});
const colors=['#f0b429','#ef4444','#3b82f6','#22c55e','#a855f7','#f59e0b','#14b8a6','#ec4899'];
if(Object.keys(catData).length) {
  new Chart(document.getElementById('spend-chart'),{type:'doughnut',data:{labels:Object.keys(catData),datasets:[{data:Object.values(catData),backgroundColor:colors.slice(0,Object.keys(catData).length),borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'right',labels:{color:'#94a3b8',font:{size:10},boxWidth:12}}}}});
} else {
  document.getElementById('spend-chart').parentElement.innerHTML='<div class="empty-state" style="padding:1rem"><p>No expense data yet</p></div>';
}

// Habits breakdown
if(!habits.length) {
  document.getElementById('habits-breakdown').innerHTML='<div class="empty-state" style="padding:1rem"><p>No habits tracked yet</p></div>';
} else {
  document.getElementById('habits-breakdown').innerHTML=habits.map(h=>{
    const streak=(() => {let s=0,d=new Date();while(true){const k=d.toISOString().split('T')[0];if(h.completedDates?.includes(k)){s++;d.setDate(d.getDate()-1);}else break;}return s;})();
    const total=h.completedDates?.length||0;
    const pct=Math.min(100,Math.round((total/30)*100));
    return `<div style="margin-bottom:0.85rem">
      <div style="display:flex;justify-content:space-between;margin-bottom:0.3rem">
        <span style="font-size:0.85rem">${h.emoji} ${h.name}</span>
        <span style="font-size:0.78rem;color:var(--blue)"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:inline-block;vertical-align:-2px"><path d="M12 2c0 0-4 4-4 8a4 4 0 0 0 8 0c0-4-4-8-4-8z"/><path d="M12 14c-1.1 0-2-.9-2-2 0-2 2-4 2-4s2 2 2 4c0 1.1-.9 2-2 2z"/></svg> ${streak} streak</span>
      </div>
      <div class="progress"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div style="font-size:0.7rem;color:var(--text-muted);margin-top:0.2rem">${total} total completions</div>
    </div>`;
  }).join('');
}

document.getElementById('data-summary').innerHTML=[
  {label:'Journal Entries',value:Object.keys(journal).length,icon:'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:inline-block;vertical-align:-2px"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>️'},
  {label:'Goals Set',value:goals.length,icon:'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:inline-block;vertical-align:-2px"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>'},
  {label:'Brain Dump Words',value:notes.trim()?notes.trim().split(/\s+/).length:0,icon:'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:inline-block;vertical-align:-2px"><path d="M9.5 2A2.5 2.5 0 0 1 12 4.5v15a2.5 2.5 0 0 1-4.96-.46"/></svg>'},
  {label:'Expenses Logged',value:expenses.length,icon:'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:inline-block;vertical-align:-2px"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>'},
].map(s=>`<div class="stat-card"><div style="font-size:1.5rem">${s.icon}</div><div><div class="stat-value" style="font-size:1.4rem">${s.value}</div><div class="stat-label">${s.label}</div></div></div>`).join('');
</script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  buildNav('analytics');
  buildFooter();
});
</script>
</body></html>
