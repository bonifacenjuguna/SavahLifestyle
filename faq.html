<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FAQ — SavahLifestyle</title>
  <link rel="stylesheet" href="css/style.css"/>
  <script src="js/app.js" defer></script>
  <script src="js/localAuth.js" defer></script>
<script src="js/nav.js" defer></script>
  <style>
    .faq-item { border-bottom:1px solid var(--border); }
    .faq-q { display:flex; align-items:center; justify-content:space-between; padding:1.1rem 0; cursor:pointer; font-weight:600; font-size:.95rem; gap:1rem; user-select:none; }
    .faq-q svg { flex-shrink:0; transition:transform .25s; }
    .faq-item.open .faq-q svg { transform:rotate(180deg); }
    .faq-a { display:none; padding:0 0 1.1rem; font-size:.9rem; color:var(--text-muted); line-height:1.7; }
    .faq-item.open .faq-a { display:block; }
    .faq-cat { font-family:var(--font-head); font-weight:700; font-size:1rem; margin:2rem 0 .75rem; color:var(--blue); display:flex; align-items:center; gap:.5rem; }
  </style>
</head>
<body>
<div id="page-loader"><div class="loader-logo"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>Savah<span>Lifestyle</span></div><div class="loader-bar-wrap"><div class="loader-bar"></div></div></div>
<div class="page">
<div class="container-sm" style="padding-top:2rem;padding-bottom:4rem">
  <div class="page-header">
    <div>
      <h1 class="page-title">Frequently Asked <span>Questions</span></h1>
      <p class="page-subtitle">Everything you need to know about SavahLifestyle</p>
    </div>
    <a href="index.html" class="nav-back"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>Back</a>
  </div>

  <div class="card card-p">
    <div class="faq-cat"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>Account & Access</div>
    <div id="faq-list"></div>
  </div>

  <!-- Suggest feature -->
  <div class="card card-p" style="margin-top:2rem" id="suggest-section">
    <h2 class="card-title" style="font-size:1.1rem">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--blue)" stroke-width="2"><line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"/><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"/><circle cx="12" cy="12" r="4"/></svg>
      Suggest a Feature
    </h2>
    <p style="font-size:.85rem;color:var(--text-muted);margin-bottom:1.25rem">Have an idea? We'd love to hear it — the best features come from the community.</p>
    <div class="form-group">
      <label class="form-label">Feature Title</label>
      <input type="text" class="form-input" id="sug-title" placeholder="e.g. Dark mode for calculator"/>
    </div>
    <div class="form-group">
      <label class="form-label">Category</label>
      <select class="form-select" id="sug-cat">
        <option>New Feature</option><option>Improvement</option><option>Bug Report</option><option>Design</option><option>Performance</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Description</label>
      <textarea class="form-textarea" id="sug-desc" placeholder="Describe the feature or improvement in detail..."></textarea>
    </div>
    <button class="btn btn-primary" onclick="submitSuggestion()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      Submit Suggestion
    </button>
  </div>
</div>
</div>

<script>
const FAQS = [
  { q:'Is SavahLifestyle free to use?', a:'Yes, SavahLifestyle is completely free. Create an account and access all features with no subscription required.' },
  { q:'How do I create an account?', a:'Click "Sign In" in the top navigation, then select "Create Account". Enter your name, email, and password — your username is automatically generated from your email address.' },
  { q:'Can I sign in with Google or Facebook?', a:'Yes! On the login page you\'ll find buttons to sign in with Google or Facebook. The first time you use social sign-in, a new account is created automatically.' },
  { q:'Is my data private and secure?', a:'Your data is stored securely in MongoDB Atlas with JWT-based authentication. We never sell your data. Passwords are hashed with bcrypt and are never stored in plain text.' },
  { q:'What is my username?', a:'Your username is automatically derived from your email address — everything before the @ symbol. For example, john.doe@gmail.com becomes johndoe.' },
  { q:'Can I use SavahLifestyle on mobile?', a:'Absolutely. The app is fully responsive and works on all screen sizes — phones, tablets, and desktops. All features adapt to your screen.' },
  { q:'How does the Focus Timer work?', a:'The Pomodoro-style timer on the Focus Music and Focus Mode pages lets you set work and break intervals. Start the timer and let ambient sounds keep you focused.' },
  { q:'What sounds are available in Focus Music?', a:'All sounds are synthesized in real-time using the Web Audio API — including Rain, Thunderstorm, Ocean Waves, Forest, Fireplace, Wind, Café, Deep Space, Library, City, River, and Meditation drones. You can mix multiple sounds simultaneously.' },
  { q:'How do I report a bug?', a:'Use the "Suggest a Feature" form on this page and select "Bug Report" as the category. Describe what happened and how to reproduce it.' },
  { q:'Is there an admin panel?', a:'Yes, the site owner has access to a full admin dashboard with user management, analytics, API key configuration, location data, and the ability to broadcast notifications to all users.' },
  { q:'How do I add a weather API key?', a:'If you\'re the admin, go to Admin Panel → API Keys and enter your OpenWeatherMap API key. Free accounts from openweathermap.org work fine. Regular users can also add one under Settings.' },
];

function renderFAQs() {
  document.getElementById('faq-list').innerHTML = FAQS.map((f,i)=>`
    <div class="faq-item" id="faq-${i}">
      <div class="faq-q" onclick="toggleFaq(${i})">
        <span>${f.q}</span>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <div class="faq-a">${f.a}</div>
    </div>`).join('');
}

function toggleFaq(i) {
  const el = document.getElementById('faq-'+i);
  el.classList.toggle('open');
}

async function submitSuggestion() {
  const title = document.getElementById('sug-title').value.trim();
  const cat   = document.getElementById('sug-cat').value;
  const desc  = document.getElementById('sug-desc').value.trim();
  if (!title || !desc) { Toast.show('Please fill in title and description','warning'); return; }
  // Save suggestion via data API
  if (Auth.isLoggedIn()) {
    const key = 'suggestion_'+Date.now();
    await API.saveData(key, { title, cat, desc, ts: new Date().toISOString() });
  }
  Toast.show('Thank you! Suggestion submitted.','success');
  document.getElementById('sug-title').value = '';
  document.getElementById('sug-desc').value = '';
}

document.addEventListener('DOMContentLoaded', () => {
  buildNav();
  buildFooter();
  renderFAQs();
});
</script>
</body>
</html>
