  <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)"/>

  <meta name="keywords" content="productivity, lifestyle, wellness, tasks, focus, journal, SavahLifestyle"/>
  <meta name="author" content="SavahLifestyle"/>
  <meta name="robots" content="index, follow"/>
  <meta property="og:title" content="Tasks — SavahLifestyle"/>
  <meta property="og:description" content="Manage your tasks and todos with SavahLifestyle."/>
  <meta property="og:type" content="website"/>
  <meta property="og:site_name" content="SavahLifestyle"/>
  <meta name="twitter:card" content="summary"/>
  <meta name="twitter:title" content="Tasks — SavahLifestyle"/>
  <meta name="twitter:description" content="Manage your tasks and todos with SavahLifestyle."/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <meta name="apple-mobile-web-app-title" content="SavahLifestyle"/>
  <title>To-Do List — SavahLifestyle</title>
  <link rel="stylesheet" href="css/style.css"/>
  <script src="js/app.js" defer></script>
  <script src="js/localAuth.js" defer></script>
<script src="js/nav.js" defer></script>
  
  
  <style>
    .todo-item { display:flex; align-items:center; gap:0.75rem; padding:0.9rem 1rem; background:var(--card); border:1px solid var(--border); border-radius:var(--radius-sm); transition:var(--transition); margin-bottom:0.5rem; }
    .todo-item:hover { border-color:var(--border-accent); }
    .todo-item.done { opacity:0.6; }
    .todo-item.done .todo-text { text-decoration:line-through; color:var(--text-muted); }
    .todo-check { width:20px; height:20px; border-radius:50%; border:2px solid var(--border); cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:var(--transition); }
    .todo-item.done .todo-check { background:var(--success); border-color:var(--success); }
    .todo-text { flex:1; font-size:0.92rem; color:var(--text); }
    .priority-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
    .p-high { background:#ef4444; }
    .p-medium { background:#f59e0b; }
    .p-low { background:#22c55e; }
    .filter-row { display:flex; gap:0.5rem; flex-wrap:wrap; margin-bottom:1.5rem; }
    .filter-btn { padding:0.3rem 0.8rem; border-radius:999px; background:var(--card); border:1px solid var(--border); color:var(--text-muted); font-size:0.78rem; cursor:pointer; transition:var(--transition); }
    .filter-btn.active { background:var(--blue-dim); border-color:var(--border-accent); color:var(--blue); }
  </style>
</head>
<body>
<nav class="nav">
  <a href="index.html" class="nav-logo"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>Savah<span>Lifestyle</span></a>
  <div class="nav-actions">
    <a href="index.html" class="nav-back"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>Dashboard</a>
    <button class="theme-toggle" id="theme-toggle"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg></button>
  </div>
</nav>
<div class="page"><div class="container-sm">
  <div class="page-header">
    <div><h1 class="page-title">To-Do <span>List</span></h1><p class="page-subtitle">Organize your tasks and stay on track</p></div>
  </div>

  <!-- Stats -->
  <div class="grid-4" style="margin-bottom:2rem" id="todo-stats"></div>

  <!-- Add Task -->
  <div class="card" style="margin-bottom:1.5rem">
    <div style="display:flex;gap:0.75rem;flex-wrap:wrap">
      <input type="text" id="task-input" placeholder="Add a new task..." style="flex:1;min-width:200px" />
      <select id="task-priority" style="width:auto">
        <option value="medium">Medium Priority</option>
        <option value="high">High Priority</option>
        <option value="low">Low Priority</option>
      </select>
      <select id="task-category" style="width:auto">
        <option value="">No Category</option>
        <option value="Work">Work</option>
        <option value="Personal">Personal</option>
        <option value="Health">Health</option>
        <option value="Finance">Finance</option>
        <option value="Learning">Learning</option>
      </select>
      <button class="btn btn-primary" onclick="addTask()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Add Task
      </button>
    </div>
  </div>

  <!-- Filters -->
  <div class="filter-row">
    <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
    <button class="filter-btn" onclick="setFilter('active', this)">Active</button>
    <button class="filter-btn" onclick="setFilter('done', this)">Done</button>
    <button class="filter-btn" onclick="setFilter('high', this)"><svg width="10" height="10" viewBox="0 0 24 24" style="display:inline-block;vertical-align:-1px"><circle cx="12" cy="12" r="10" fill="#ef4444"/></svg> High</button>
    <button class="filter-btn" onclick="setFilter('medium', this)"><svg width="10" height="10" viewBox="0 0 24 24" style="display:inline-block;vertical-align:-1px"><circle cx="12" cy="12" r="10" fill="#f59e0b"/></svg> Medium</button>
    <button class="filter-btn" onclick="setFilter('low', this)"><svg width="10" height="10" viewBox="0 0 24 24" style="display:inline-block;vertical-align:-1px"><circle cx="12" cy="12" r="10" fill="#22c55e"/></svg> Low</button>
  </div>

  <!-- Task List -->
  <div id="todo-list"></div>
</div></div>

<script>
let todos = JSON.parse(localStorage.getItem('savah:todos') || '[]');
let currentFilter = 'all';

function addTask() {
  const input = document.getElementById('task-input');
  const text = input.value.trim();
  if (!text) return;
  todos.unshift({ id: Date.now(), text, priority: document.getElementById('task-priority').value, category: document.getElementById('task-category').value, done: false, created: new Date().toISOString().split('T')[0] });
  input.value = '';
  save();
  Toast.show('Task added', 'success');
}

document.getElementById('task-input').addEventListener('keydown', e => { if (e.key === 'Enter') addTask(); });

function toggleTask(id) {
  const t = todos.find(t => t.id === id);
  if (t) { t.done = !t.done; t.completedDate = t.done ? new Date().toISOString().split('T')[0] : null; }
  save();
}

function deleteTask(id) {
  todos = todos.filter(t => t.id !== id);
  save();
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function save() { localStorage.setItem('savah:todos', JSON.stringify(todos)); render(); }

function render() {
  let filtered = todos;
  if (currentFilter === 'active') filtered = todos.filter(t => !t.done);
  else if (currentFilter === 'done') filtered = todos.filter(t => t.done);
  else if (['high','medium','low'].includes(currentFilter)) filtered = todos.filter(t => t.priority === currentFilter);

  const total = todos.length, done = todos.filter(t => t.done).length, active = total - done;
  const today = new Date().toISOString().split('T')[0];
  const todayDone = todos.filter(t => t.done && t.completedDate === today).length;

  document.getElementById('todo-stats').innerHTML = [
    { label: 'Total', value: total, color: 'var(--blue)' },
    { label: 'Active', value: active, color: '#3b82f6' },
    { label: 'Done', value: done, color: 'var(--success)' },
    { label: 'Today', value: todayDone, color: '#a855f7' },
  ].map(s => `<div class="stat-card"><div class="stat-icon" style="background:${s.color}22"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="${s.color}" stroke-width="2"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg></div><div><div class="stat-value" style="color:${s.color}">${s.value}</div><div class="stat-label">${s.label}</div></div></div>`).join('');

  if (!filtered.length) {
    document.getElementById('todo-list').innerHTML = `<div class="empty-state"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg><h3>No tasks</h3><p>Add your first task above!</p></div>`;
    return;
  }

  document.getElementById('todo-list').innerHTML = filtered.map(t => `
    <div class="todo-item ${t.done ? 'done' : ''}" id="task-${t.id}">
      <div class="priority-dot p-${t.priority}"></div>
      <div class="todo-check" onclick="toggleTask(${t.id})">
        ${t.done ? '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>' : ''}
      </div>
      <div class="todo-text">${t.text}</div>
      ${t.category ? `<span class="badge badge-silver" style="font-size:0.7rem">${t.category}</span>` : ''}
      <span class="badge badge-${t.priority === 'high' ? 'danger' : t.priority === 'low' ? 'success' : 'gold'}" style="font-size:0.7rem">${t.priority}</span>
      <button class="btn-icon btn" onclick="deleteTask(${t.id})"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg></button>
    </div>
  `).join('');
}
render();
</script>
</body>
</html>
